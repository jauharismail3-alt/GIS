<body>
<div id="map"></div>

<script src="js/leaflet.js"></script>

<script>
var map = L.map('map').setView([-7.08,112.76], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var layer1 = L.geoJSON(json_Kemiringanlereng_2).addTo(map);
var layer2 = L.geoJSON(json_Kontur_3).addTo(map);
var layer3 = L.geoJSON(json_Batasareatambang_4).addTo(map);
var layer4 = L.geoJSON(json_Titiktingkatkesuburan_5).addTo(map);

</script>
